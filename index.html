<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC GUIDE PORTAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans+JP:wght@300;400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#080808;--white:#f0ede8;--red:#c8281e;--gray:#1e1e1e;
  --mid:#444;--light:#888;--border:#2a2a2a;
}
body{background:var(--black);color:var(--white);font-family:'IBM Plex Sans JP',sans-serif;font-weight:300;line-height:1.6;min-height:100vh;}

/* ===== PORTAL ===== */
#portal{display:block;}
#guide-view{display:none;}

.portal-hero{
  padding:3rem 2rem 2rem;
  border-bottom:2px solid var(--red);
  position:relative;overflow:hidden;
}
.portal-hero::after{
  content:'DISC\AGUIDE';
  white-space:pre;
  position:absolute;top:-2rem;right:-1rem;
  font-family:'Bebas Neue',sans-serif;font-size:9rem;
  color:#161616;pointer-events:none;line-height:1;user-select:none;
}
.portal-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.25em;color:var(--red);text-transform:uppercase;margin-bottom:.4rem;}
.portal-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,6rem);line-height:.95;position:relative;z-index:1;}
.portal-meta{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--light);margin-top:1rem;letter-spacing:.08em;position:relative;z-index:1;}

.portal-filter{
  display:flex;gap:.4rem;flex-wrap:wrap;
  padding:1rem 2rem;border-bottom:1px solid var(--border);
  background:#0f0f0f;position:sticky;top:0;z-index:100;
}
.pf-btn{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--mid);background:transparent;color:var(--light);
  padding:.25rem .7rem;cursor:pointer;transition:all .15s;
}
.pf-btn:hover,.pf-btn.active{background:var(--red);border-color:var(--red);color:var(--white);}

.portal-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:0;
}
.portal-card{
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:1.6rem 1.4rem;cursor:pointer;transition:background .15s;
  position:relative;
}
.portal-card:hover{background:#131313;}
.portal-card.hidden{display:none;}
.pc-type{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:.3rem;}
.pc-name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1;letter-spacing:.03em;margin-bottom:.2rem;}
.pc-sub{font-size:.75rem;color:var(--light);margin-bottom:.7rem;}
.pc-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.7rem;}
.pc-tag{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;border:1px solid var(--border);color:var(--mid);padding:.1rem .4rem;text-transform:uppercase;}
.pc-desc{font-size:.75rem;color:#999;line-height:1.7;}
.pc-count{position:absolute;top:1.2rem;right:1.2rem;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--mid);}

/* ===== GUIDE VIEW ===== */
.guide-header{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 2rem;border-bottom:1px solid var(--border);
  background:#0f0f0f;position:sticky;top:0;z-index:100;
}
.back-btn{
  font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
  border:1px solid var(--mid);background:transparent;color:var(--light);
  padding:.3rem .8rem;cursor:pointer;transition:all .15s;
}
.back-btn:hover{border-color:var(--red);color:var(--red);}
.guide-title-bar{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;line-height:1;}
.guide-subtitle-bar{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--light);letter-spacing:.1em;}

.guide-hero{
  padding:2.5rem 2rem 1.5rem;
  border-bottom:2px solid var(--red);
  position:relative;overflow:hidden;
}
.guide-hero-bg{
  position:absolute;top:-1rem;right:-1rem;
  font-family:'Bebas Neue',sans-serif;font-size:8rem;
  color:#141414;pointer-events:none;line-height:1;user-select:none;
  white-space:nowrap;
}
.guide-hero-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:.4rem;position:relative;z-index:1;}
.guide-hero-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);line-height:.95;position:relative;z-index:1;}
.guide-hero-desc{font-size:.82rem;color:#aaa;margin-top:1rem;max-width:600px;position:relative;z-index:1;line-height:1.8;}

.guide-filter{display:flex;flex-direction:column;gap:.5rem;padding:1rem 2rem;border-bottom:1px solid var(--border);background:#0f0f0f;}
.filter-row{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}
.filter-row-label{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.15em;color:var(--mid);text-transform:uppercase;min-width:56px;flex-shrink:0;}
.gf-btn{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--mid);background:transparent;color:var(--light);padding:.25rem .7rem;cursor:pointer;transition:all .15s;}
.gf-btn:hover,.gf-btn.active{background:var(--red);border-color:var(--red);color:var(--white);}
.gf-btn.mood-active-night{background:#12122a;border-color:#5555bb;color:#aaaaee;}
.gf-btn.mood-active-drive{background:#2a1800;border-color:#bb7700;color:#ffbb44;}
.gf-btn.mood-active-focus{background:#001a0e;border-color:#00aa55;color:#44ffaa;}

.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0;}
.album-card{
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:1.6rem 1.4rem;position:relative;transition:background .15s;
}
.album-card:hover{background:#131313;}
.album-card.essential{border-left:3px solid var(--red);}
.album-card.hidden{display:none;}
.ac-essential{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--red);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.3rem;}
.ac-year{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--red);letter-spacing:.15em;margin-bottom:.3rem;}
.ac-artist{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.05em;line-height:1;margin-bottom:.15rem;}
.ac-title{font-size:.78rem;color:var(--light);font-style:italic;margin-bottom:.7rem;}
.ac-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.7rem;}
.ac-tag{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;border:1px solid var(--border);color:var(--mid);padding:.1rem .4rem;text-transform:uppercase;}
.ac-tag.grunge{border-color:#6b3a3a;color:#c08080;}
.ac-tag.indie{border-color:#3a5a6b;color:#80b0c0;}
.ac-tag.noise{border-color:#5a4a6b;color:#a080c0;}
.ac-tag.folk{border-color:#4a6b3a;color:#80c080;}
.ac-tag.hiphop{border-color:#6b5a3a;color:#c0a080;}
.ac-tag.shoegaze{border-color:#6b3a5a;color:#c080a0;}
.ac-tag.rock{border-color:#6b6b3a;color:#c0c080;}
.ac-tag.soul{border-color:#6b3a4a;color:#c08090;}
.ac-tag.jazz{border-color:#3a6b5a;color:#80c0a0;}
.ac-tag.country{border-color:#5a6b3a;color:#a0c080;}
.ac-tag.electronic{border-color:#3a4a6b;color:#8090c0;}
.ac-tag.boomrap{border-color:#6b503a;color:#c0a080;}
.ac-tag.conscious{border-color:#3a6b6b;color:#80c0c0;}
.ac-tag.britpop{border-color:#4a3a6b;color:#9080c0;}
.ac-tag.psych{border-color:#6b3a6b;color:#c080c0;}
.ac-tag.metal{border-color:#5a3a3a;color:#c07070;}
.ac-tag.blues{border-color:#3a5a3a;color:#70c070;}
.ac-desc{font-size:.76rem;color:#999;line-height:1.75;}
.ac-rating{position:absolute;top:1.2rem;right:1.2rem;font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--red);}

footer{border-top:1px solid var(--border);padding:1.5rem 2rem;font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--mid);letter-spacing:.08em;}
</style>
</head>
<body>

<!-- ===== PORTAL ===== -->
<div id="portal">
  <header class="portal-hero">
    <div class="portal-label">Music Disc Guide Portal</div>
    <h1 class="portal-h1">DISC<br>GUIDE</h1>
    <div class="portal-meta">20+ GUIDES — LABEL / ARTIST / GENRE / ERA</div>
  </header>
  <div class="portal-filter">
    <button class="pf-btn active" data-filter="all">ALL</button>
    <button class="pf-btn" data-filter="label">LABEL</button>
    <button class="pf-btn" data-filter="artist">ARTIST</button>
    <button class="pf-btn" data-filter="genre">GENRE</button>
    <button class="pf-btn" data-filter="era">ERA</button>
  </div>
  <div class="portal-grid" id="portal-grid"></div>
  <footer>DISC GUIDE PORTAL — 参考: AllMusic / Pitchfork / Rolling Stone / NME / HipHopDX / UGMKM</footer>
</div>

<!-- ===== GUIDE VIEW ===== -->
<div id="guide-view">
  <div class="guide-header">
    <button class="back-btn" id="back-btn">← BACK</button>
    <div>
      <div class="guide-title-bar" id="gv-title"></div>
      <div class="guide-subtitle-bar" id="gv-sub"></div>
    </div>
  </div>
  <div class="guide-hero">
    <div class="guide-hero-bg" id="gv-bg"></div>
    <div class="guide-hero-label" id="gv-label"></div>
    <h2 class="guide-hero-h1" id="gv-h1"></h2>
    <p class="guide-hero-desc" id="gv-desc"></p>
  </div>
  <div class="guide-filter" id="gv-filter"></div>
  <div class="album-grid" id="gv-grid"></div>
  <footer>DISC GUIDE PORTAL — 参考: AllMusic / Pitchfork / Rolling Stone / NME / HipHopDX / UGMKM</footer>
</div>

function getMeta(artist, title) {
  const key = `${artist}|${title}`;
  return META[key] || {dur:45, mood:['drive'], decade:'90s'};
}

function getDurLabel(min) {
  if (min < 30) return 'short';
  if (min <= 50) return 'mid';
  return 'long';
}

function getStarCount(rating) {
  return (rating.match(/★/g)||[]).length;
}

function getDecade(year) {
  const d = Math.floor(year/10)*10;
  return d + 's';
}

// PORTAL
// ============================================================
const portalGrid = document.getElementById('portal-grid');
const pfBtns = document.querySelectorAll('.pf-btn');

function renderPortal(filter) {
  portalGrid.innerHTML = '';
  GUIDES.forEach(g => {
    const show = filter === 'all' || g.type === filter;
    const card = document.createElement('div');
    card.className = 'portal-card' + (show ? '' : ' hidden');
    card.innerHTML = `
      <div class="pc-count">${g.albums.length} albums</div>
      <div class="pc-type">${g.type.toUpperCase()}</div>
      <div class="pc-name">${g.name}</div>
      <div class="pc-sub">${g.sub}</div>
      <div class="pc-tags">${g.tags.map(t=>`<span class="pc-tag">${t}</span>`).join('')}</div>
      <div class="pc-desc">${g.desc}</div>
    `;
    card.addEventListener('click', () => openGuide(g.id));
    portalGrid.appendChild(card);
  });
}

pfBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    pfBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPortal(btn.dataset.filter);
  });
});

renderPortal('all');

// GUIDE VIEW
// ============================================================
let currentGuide = null;

// active filter state per axis
const activeFilters = {
  genre: 'all',
  essential: false,
  decade: 'all',
  rating: 'all',
  duration: 'all',
  mood: 'all',
};

function openGuide(id) {
  const g = GUIDES.find(x => x.id === id);
  if (!g) return;
  currentGuide = g;

  // reset filters
  Object.keys(activeFilters).forEach(k => {
    activeFilters[k] = k === 'essential' ? false : 'all';
  });

  document.getElementById('gv-title').textContent = g.name;
  document.getElementById('gv-sub').textContent = g.sub;
  document.getElementById('gv-bg').textContent = g.name.split(' ').slice(0,2).join(' ');
  document.getElementById('gv-label').textContent = g.type.toUpperCase() + ' GUIDE';
  document.getElementById('gv-h1').textContent = g.name;
  document.getElementById('gv-desc').textContent = g.desc;

  buildFilterUI(g);
  renderAlbums(g.albums);

  document.getElementById('portal').style.display = 'none';
  document.getElementById('guide-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function buildFilterUI(g) {
  const filterEl = document.getElementById('gv-filter');
  const allTags = [...new Set(g.albums.flatMap(a => a.tags))];
  const decades = [...new Set(g.albums.map(a => getMeta(a.artist, a.title).decade || getDecade(a.year)))].sort();

  filterEl.innerHTML = `
    <div class="filter-row">
      <span class="filter-row-label">GENRE</span>
      <button class="gf-btn active" data-axis="genre" data-val="all">ALL</button>
      ${allTags.map(t=>`<button class="gf-btn" data-axis="genre" data-val="${t}">${t.toUpperCase()}</button>`).join('')}
      <button class="gf-btn" data-axis="essential" data-val="toggle">★ ESSENTIAL</button>
    </div>
    <div class="filter-row">
      <span class="filter-row-label">DECADE</span>
      <button class="gf-btn active" data-axis="decade" data-val="all">ALL</button>
      ${decades.map(d=>`<button class="gf-btn" data-axis="decade" data-val="${d}">${d}</button>`).join('')}
    </div>
    <div class="filter-row">
      <span class="filter-row-label">RATING</span>
      <button class="gf-btn active" data-axis="rating" data-val="all">ALL</button>
      <button class="gf-btn" data-axis="rating" data-val="5">★★★★★</button>
      <button class="gf-btn" data-axis="rating" data-val="4">★★★★+</button>
      <button class="gf-btn" data-axis="rating" data-val="3">★★★+</button>
    </div>
    <div class="filter-row">
      <span class="filter-row-label">TIME</span>
      <button class="gf-btn active" data-axis="duration" data-val="all">ALL</button>
      <button class="gf-btn" data-axis="duration" data-val="short">〜30分</button>
      <button class="gf-btn" data-axis="duration" data-val="mid">30〜50分</button>
      <button class="gf-btn" data-axis="duration" data-val="long">50分〜</button>
    </div>
    <div class="filter-row">
      <span class="filter-row-label">MOOD</span>
      <button class="gf-btn active" data-axis="mood" data-val="all">ALL</button>
      <button class="gf-btn" data-axis="mood" data-val="night">🌙 夜聴き</button>
      <button class="gf-btn" data-axis="mood" data-val="drive">🚗 ドライブ</button>
      <button class="gf-btn" data-axis="mood" data-val="focus">🎧 集中</button>
    </div>
  `;

  filterEl.addEventListener('click', e => {
    const btn = e.target.closest('.gf-btn');
    if (!btn) return;
    const axis = btn.dataset.axis;
    const val  = btn.dataset.val;

    if (axis === 'essential') {
      activeFilters.essential = !activeFilters.essential;
      btn.classList.toggle('active', activeFilters.essential);
    } else {
      // single-select per row
      filterEl.querySelectorAll(`.gf-btn[data-axis="${axis}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilters[axis] = val;
    }
    renderAlbums(currentGuide.albums);
  });
}

function albumMatches(a) {
  const meta = getMeta(a.artist, a.title);
  const dur  = meta.dur || 45;
  const mood = meta.mood || ['drive'];
  const decade = meta.decade || getDecade(a.year);
  const stars = getStarCount(a.rating);
  const durLabel = getDurLabel(dur);

  if (activeFilters.essential && !a.essential) return false;
  if (activeFilters.genre !== 'all' && !a.tags.includes(activeFilters.genre)) return false;
  if (activeFilters.decade !== 'all' && decade !== activeFilters.decade) return false;
  if (activeFilters.rating !== 'all' && stars < parseInt(activeFilters.rating)) return false;
  if (activeFilters.duration !== 'all' && durLabel !== activeFilters.duration) return false;
  if (activeFilters.mood !== 'all' && !mood.includes(activeFilters.mood)) return false;
  return true;
}

function renderAlbums(albums) {
  const grid = document.getElementById('gv-grid');
  grid.innerHTML = '';
  let visible = 0;
  albums.forEach(a => {
    const show = albumMatches(a);
    if (show) visible++;
    const meta = getMeta(a.artist, a.title);
    const durMin = meta.dur || 45;
    const mood = (meta.mood||['drive']);
    const moodEmoji = mood.map(m => m==='night'?'🌙':m==='drive'?'🚗':'🎧').join(' ');
    const durStr = durMin >= 60
      ? `${Math.floor(durMin/60)}h${durMin%60>0?String(durMin%60).padStart(2,'0')+'m':''}` 
      : `${durMin}m`;

    const card = document.createElement('div');
    card.className = 'album-card' + (a.essential?' essential':'') + (show?'':' hidden');
    card.innerHTML = `
      <div class="ac-rating">${a.rating}</div>
      ${a.essential?'<div class="ac-essential">▶ ESSENTIAL</div>':''}
      <div class="ac-year">${a.year}</div>
      <div class="ac-artist">${a.artist}</div>
      <div class="ac-title">${a.title}</div>
      <div class="ac-tags">
        ${a.tags.map(t=>`<span class="ac-tag ${t}">${t}</span>`).join('')}
        <span class="ac-tag" style="border-color:#333;color:#666;">${durStr}</span>
        <span class="ac-tag" style="border-color:#333;color:#666;">${moodEmoji}</span>
      </div>
      <div class="ac-desc">${a.desc}</div>
    `;
    grid.appendChild(card);
  });

  // no results message
  if (visible === 0) {
    const msg = document.createElement('div');
    msg.style.cssText = 'grid-column:1/-1;padding:3rem 2rem;font-family:"IBM Plex Mono",monospace;font-size:.7rem;color:#444;letter-spacing:.1em;';
    msg.textContent = 'NO RESULTS — TRY DIFFERENT FILTERS';
    grid.appendChild(msg);
  }
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('guide-view').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
  window.scrollTo(0, 0);
});
</script>
</body>
</html>
